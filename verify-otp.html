<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="cache-control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <title>Verify OTP | Danah Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Montserrat", "ui-sans-serif", "system-ui", "sans-serif"],
            },
            colors: {
              navy: "#0A0F2C",
              teal: "#00D2C4",
              cyan: "#00B5E2",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "translateY(0) rotate(0deg)" },
                "50%": { transform: "translateY(-18px) rotate(1.5deg)" },
              },
              shimmer: {
                "0%": { transform: "translateX(-120%)" },
                "100%": { transform: "translateX(120%)" },
              },
            },
            animation: {
              float: "float 6s ease-in-out infinite",
              shimmer: "shimmer 3.5s ease-in-out infinite",
            },
          },
        },
      };

      // Prevent auto-reload from development tools
      if (window.location.protocol === "file:") {
        // Check for Live Server
        if (
          window.location.port === "5500" ||
          document.querySelector('script[src*="live-server"]')
        ) {
          console.warn(
            "⚠️ Live Server detected! This may cause auto-reloads. Consider disabling Live Server extension in VS Code.",
          );
        }

        // Disable Live Server auto-refresh
        window.addEventListener("beforeunload", function (e) {
          // Prevent page refresh
          e.preventDefault();
          e.returnValue = "";
        });

        // Override any auto-refresh attempts
        const originalLocation = window.location;
        window.location = {
          ...originalLocation,
          reload: function () {
            console.log("Auto-reload prevented");
          },
          replace: originalLocation.replace.bind(originalLocation),
          assign: originalLocation.assign.bind(originalLocation),
        };
      }

      // Prevent form double-submission
      let isSubmitting = false;
    </script>
  </head>
  <body
    class="min-h-screen overflow-x-hidden bg-navy font-sans text-white antialiased selection:bg-teal/30 selection:text-white"
  >
    <section
      id="verify-otp"
      class="relative flex min-h-screen scroll-mt-24 items-center justify-center overflow-hidden bg-[radial-gradient(circle_at_78%_12%,rgba(0,210,196,0.18),transparent_28rem),radial-gradient(circle_at_10%_80%,rgba(0,181,226,0.14),transparent_26rem),#0A0F2C] px-6 py-28 sm:px-10"
    >
      <div
        class="pointer-events-none absolute inset-0 opacity-25 [background-image:linear-gradient(rgba(255,255,255,.06)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,.06)_1px,transparent_1px)] [background-size:58px_58px] [mask-image:linear-gradient(to_bottom,black,transparent_88%)]"
      ></div>
      <div
        class="pointer-events-none absolute -right-44 top-20 h-[28rem] w-[28rem] rotate-45 border border-teal/20 bg-teal/[0.035]"
      ></div>
      <div
        class="pointer-events-none absolute -left-44 bottom-10 h-[24rem] w-[24rem] -rotate-12 border border-cyan/20 bg-cyan/[0.035]"
      ></div>

      <div class="relative z-10 w-full max-w-[470px]">
        <a
          href="index.html#home"
          class="mb-7 inline-flex min-h-[44px] items-center gap-2 rounded-full border border-white/10 bg-white/[0.05] px-4 text-sm font-bold text-white/78 backdrop-blur-xl transition-all duration-300 hover:-translate-x-1 hover:border-teal/60 hover:bg-teal/10 hover:text-white"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M19 12H5m0 0 6-6m-6 6 6 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Back to Home
        </a>

        <form
          id="otpForm"
          class="rounded-[1.6rem] border border-teal/30 bg-white/[0.075] p-6 shadow-[0_0_60px_rgba(0,210,196,0.14),0_28px_80px_rgba(0,0,0,0.38)] backdrop-blur-2xl sm:p-8"
        >
          <div class="mb-8 text-center">
            <div
              class="mx-auto mb-5 inline-flex items-center justify-center gap-3"
            >
              <img
                src="danah-web-bgc.png"
                alt="Danah Web"
                class="h-12 w-auto max-w-[150px] rounded-xl object-contain"
              />
              <span class="text-lg font-extrabold text-white">Danah Web</span>
            </div>
            <h2 class="text-3xl font-extrabold leading-tight sm:text-4xl">
              Verify Your Account
            </h2>
            <p class="mt-3 text-sm leading-6 text-white/58">
              We've sent verification codes to your email and mobile number.
            </p>
          </div>

          <div class="grid gap-5">
            <!-- Email OTP -->
            <div class="grid gap-2">
              <label class="text-sm font-bold text-white/82">
                Email Verification Code
              </label>
              <input
                required
                id="email-otp"
                type="text"
                placeholder="Enter 6-digit code"
                maxlength="6"
                class="min-h-[54px] w-full rounded-xl border border-teal/35 bg-[#05091f]/80 px-4 text-center text-lg font-medium text-white outline-none transition-all duration-300 placeholder:text-white/38 focus:border-teal focus:shadow-[0_0_30px_rgba(0,210,196,0.18)] focus:ring-4 focus:ring-teal/15"
              />
            </div>

            <!-- SMS OTP -->
            <div class="grid gap-2">
              <label class="text-sm font-bold text-white/82">
                SMS Verification Code
              </label>
              <input
                required
                id="sms-otp"
                type="text"
                placeholder="Enter 6-digit code"
                maxlength="6"
                class="min-h-[54px] w-full rounded-xl border border-teal/35 bg-[#05091f]/80 px-4 text-center text-lg font-medium text-white outline-none transition-all duration-300 placeholder:text-white/38 focus:border-teal focus:shadow-[0_0_30px_rgba(0,210,196,0.18)] focus:ring-4 focus:ring-teal/15"
              />
            </div>

            <div class="flex gap-3">
              <button
                type="button"
                id="resendEmailBtn"
                class="flex-1 rounded-xl border border-teal/35 bg-[#05091f]/80 py-3 text-sm font-bold text-teal transition-all duration-300 hover:border-teal hover:bg-teal/10"
              >
                Resend Email OTP
              </button>
              <button
                type="button"
                id="resendSmsBtn"
                class="flex-1 rounded-xl border border-teal/35 bg-[#05091f]/80 py-3 text-sm font-bold text-teal transition-all duration-300 hover:border-teal hover:bg-teal/10"
              >
                Resend SMS OTP
              </button>
            </div>

            <button
              type="submit"
              class="inline-flex min-h-[52px] w-full items-center justify-center rounded-full bg-gradient-to-r from-teal to-cyan px-7 text-sm font-extrabold text-white shadow-[0_18px_42px_rgba(0,181,226,0.3)] transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_22px_54px_rgba(0,210,196,0.38)]"
            >
              Verify Account
            </button>
          </div>

          <div class="mt-7 text-center">
            <p class="text-sm font-medium text-white/58">
              Wrong email or mobile?
              <a
                href="signup.html"
                class="font-extrabold text-teal transition-colors duration-300 hover:text-cyan"
                >Sign up again</a
              >
            </p>
          </div>
        </form>

        <!-- Success Notification -->
        <div
          id="successMessage"
          class="pointer-events-none absolute top-6 left-6 opacity-0 transition-all duration-500 z-50"
        >
          <div
            class="rounded-lg border border-teal/50 bg-teal/10 px-4 py-3 backdrop-blur-xl"
          >
            <p class="text-sm font-semibold text-teal" id="successText">
              ✓ Verification successful!
            </p>
          </div>
        </div>

        <!-- Error Notification -->
        <div
          id="errorMessage"
          class="pointer-events-none absolute top-6 right-6 opacity-0 transition-all duration-500 z-50"
        >
          <div
            class="rounded-lg border border-red-500/50 bg-red-500/10 px-4 py-3 backdrop-blur-xl"
          >
            <p class="text-sm font-semibold text-red-400" id="errorText"></p>
          </div>
        </div>
      </div>
    </section>

    <script>
      // OTP Verification Form Handler
      const otpForm = document.getElementById("otpForm");
      const emailOtpInput = document.getElementById("email-otp");
      const smsOtpInput = document.getElementById("sms-otp");
      const resendEmailBtn = document.getElementById("resendEmailBtn");
      const resendSmsBtn = document.getElementById("resendSmsBtn");
      const successMsg = document.getElementById("successMessage");
      const errorMsg = document.getElementById("errorMessage");
      const errorText = document.getElementById("errorText");
      const successText = document.getElementById("successText");

      let userId = localStorage.getItem("pendingUserId");
      let userEmail = "";
      let userMobile = "";

      // Load user data if available
      window.addEventListener("load", () => {
        if (!userId) {
          window.location.href = "signup.html";
          return;
        }

        // Try to get user data from localStorage
        const userData = localStorage.getItem("tempUserData");
        if (userData) {
          const user = JSON.parse(userData);
          userEmail = user.email;
          userMobile = user.mobile;
        }
      });

      // Auto-format OTP inputs
      [emailOtpInput, smsOtpInput].forEach((input) => {
        input.addEventListener("input", (e) => {
          // Remove non-digits
          e.target.value = e.target.value.replace(/\D/g, "");
        });
      });

      function showNotification(message, isSuccess = true) {
        const notification = isSuccess ? successMsg : errorMsg;
        const textElement = isSuccess ? successText : errorText;

        textElement.textContent = message;
        notification.classList.remove("opacity-0");
        notification.classList.add("opacity-100");

        setTimeout(() => {
          notification.classList.remove("opacity-100");
          notification.classList.add("opacity-0");
        }, 4000);
      }

      // Resend OTP handlers
      resendEmailBtn.addEventListener("click", async () => {
        if (!userEmail) {
          showNotification("Email not found. Please sign up again.", false);
          return;
        }

        try {
          resendEmailBtn.disabled = true;
          resendEmailBtn.textContent = "Sending...";

          const response = await fetch(
            "http://localhost:5000/api/auth/send-otp",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                email: userEmail,
                type: "email",
              }),
            },
          );

          const data = await response.json();

          if (data.success) {
            showNotification("Email OTP sent successfully!", true);
          } else {
            showNotification(data.message, false);
          }
        } catch (error) {
          console.error("Resend email OTP error:", error);
          showNotification("Failed to resend email OTP", false);
        } finally {
          resendEmailBtn.disabled = false;
          resendEmailBtn.textContent = "Resend Email OTP";
        }
      });

      resendSmsBtn.addEventListener("click", async () => {
        if (!userMobile) {
          showNotification(
            "Mobile number not found. Please sign up again.",
            false,
          );
          return;
        }

        try {
          resendSmsBtn.disabled = true;
          resendSmsBtn.textContent = "Sending...";

          const response = await fetch(
            "http://localhost:5000/api/auth/send-otp",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                mobile: userMobile,
                type: "sms",
              }),
            },
          );

          const data = await response.json();

          if (data.success) {
            showNotification("SMS OTP sent successfully!", true);
          } else {
            showNotification(data.message, false);
          }
        } catch (error) {
          console.error("Resend SMS OTP error:", error);
          showNotification("Failed to resend SMS OTP", false);
        } finally {
          resendSmsBtn.disabled = false;
          resendSmsBtn.textContent = "Resend SMS OTP";
        }
      });

      // Form submission
      otpForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Prevent double submission
        if (isSubmitting) {
          return;
        }

        const emailOtp = emailOtpInput.value.trim();
        const smsOtp = smsOtpInput.value.trim();

        if (!emailOtp || !smsOtp) {
          showNotification("Please enter both OTP codes", false);
          return;
        }

        if (emailOtp.length !== 6 || smsOtp.length !== 6) {
          showNotification("Both OTP codes must be 6 digits", false);
          return;
        }

        isSubmitting = true;

        const submitBtn = otpForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = "Verifying...";
        submitBtn.style.opacity = "0.7";

        try {
          // Verify email OTP
          const emailResponse = await fetch(
            "http://localhost:5000/api/auth/verify-otp",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                email: userEmail,
                otp: emailOtp,
                type: "email",
              }),
            },
          );

          const emailData = await emailResponse.json();

          if (!emailData.success) {
            showNotification(
              `Email verification failed: ${emailData.message}`,
              false,
            );
            return;
          }

          // Verify SMS OTP
          const smsResponse = await fetch(
            "http://localhost:5000/api/auth/verify-otp",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                mobile: userMobile,
                otp: smsOtp,
                type: "sms",
              }),
            },
          );

          const smsData = await smsResponse.json();

          if (!smsData.success) {
            showNotification(
              `SMS verification failed: ${smsData.message}`,
              false,
            );
            return;
          }

          // Both verifications successful
          if (emailData.token && smsData.token) {
            // Store token and user data
            localStorage.setItem("token", emailData.token);
            localStorage.setItem("user", JSON.stringify(emailData.user));

            // Clear temporary data
            localStorage.removeItem("pendingUserId");
            localStorage.removeItem("tempUserData");

            showNotification(
              "Account verified successfully! Redirecting...",
              true,
            );

            // Redirect to dashboard
            setTimeout(() => {
              window.location.href = "index.html";
            }, 1500);
          } else {
            showNotification("Verification completed! Please login.", true);
            setTimeout(() => {
              window.location.href = "login.html";
            }, 1500);
          }
        } catch (error) {
          console.error("OTP verification error:", error);
          showNotification("Network error. Please try again.", false);
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          submitBtn.style.opacity = "1";
          isSubmitting = false;
        }
      });
    </script>
  </body>
</html>
