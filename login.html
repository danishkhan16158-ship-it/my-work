<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="cache-control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <title>Login | Danah Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="api-config.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Montserrat", "ui-sans-serif", "system-ui", "sans-serif"],
            },
            colors: {
              navy: "#0A0F2C",
              teal: "#00D2C4",
              cyan: "#00B5E2",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "translateY(0) rotate(0deg)" },
                "50%": { transform: "translateY(-18px) rotate(1.5deg)" },
              },
              shimmer: {
                "0%": { transform: "translateX(-120%)" },
                "100%": { transform: "translateX(120%)" },
              },
            },
            animation: {
              float: "float 6s ease-in-out infinite",
              shimmer: "shimmer 3.5s ease-in-out infinite",
            },
          },
        },
      };

      // Prevent auto-reload from development tools
      if (window.location.protocol === "file:") {
        // Check for Live Server
        if (
          window.location.port === "5500" ||
          document.querySelector('script[src*="live-server"]')
        ) {
          console.warn(
            "⚠️ Live Server detected! This may cause auto-reloads. Consider disabling Live Server extension in VS Code.",
          );
        }

        // Disable Live Server auto-refresh
        window.addEventListener("beforeunload", function (e) {
          // Prevent page refresh
          e.preventDefault();
          e.returnValue = "";
        });

        // Override any auto-refresh attempts
        const originalLocation = window.location;
        window.location = {
          ...originalLocation,
          reload: function () {
            console.log("Auto-reload prevented");
          },
          replace: originalLocation.replace.bind(originalLocation),
          assign: originalLocation.assign.bind(originalLocation),
        };
      }

      // Prevent form double-submission
      let isSubmitting = false;
    </script>
  </head>
  <body
    class="min-h-screen overflow-x-hidden bg-navy font-sans text-white antialiased selection:bg-teal/30 selection:text-white"
  >
    <section
      id="login"
      class="relative flex min-h-screen scroll-mt-24 items-center justify-center overflow-hidden bg-[radial-gradient(circle_at_78%_12%,rgba(0,210,196,0.18),transparent_28rem),radial-gradient(circle_at_10%_80%,rgba(0,181,226,0.14),transparent_26rem),#0A0F2C] px-6 py-28 sm:px-10"
    >
      <div
        class="pointer-events-none absolute inset-0 opacity-25 [background-image:linear-gradient(rgba(255,255,255,.06)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,.06)_1px,transparent_1px)] [background-size:58px_58px] [mask-image:linear-gradient(to_bottom,black,transparent_88%)]"
      ></div>
      <div
        class="pointer-events-none absolute -right-44 top-20 h-[28rem] w-[28rem] rotate-45 border border-teal/20 bg-teal/[0.035]"
      ></div>
      <div
        class="pointer-events-none absolute -left-44 bottom-10 h-[24rem] w-[24rem] -rotate-12 border border-cyan/20 bg-cyan/[0.035]"
      ></div>

      <div class="relative z-10 w-full max-w-[470px]">
        <a
          href="index.html#home"
          class="mb-7 inline-flex min-h-[44px] items-center gap-2 rounded-full border border-white/10 bg-white/[0.05] px-4 text-sm font-bold text-white/78 backdrop-blur-xl transition-all duration-300 hover:-translate-x-1 hover:border-teal/60 hover:bg-teal/10 hover:text-white"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M19 12H5m0 0 6-6m-6 6 6 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Back to Home
        </a>

        <form
          id="loginForm"
          action="#"
          method="post"
          class="rounded-[1.6rem] border border-teal/30 bg-white/[0.075] p-6 shadow-[0_0_60px_rgba(0,210,196,0.14),0_28px_80px_rgba(0,0,0,0.38)] backdrop-blur-2xl sm:p-8"
        >
          <div class="mb-8 text-center">
            <div
              class="mx-auto mb-5 inline-flex items-center justify-center gap-3"
            >
              <img
                src="danah-web-bgc.png"
                alt="Danah Web"
                class="h-12 w-auto max-w-[150px] rounded-xl object-contain"
              />
              <span class="text-lg font-extrabold text-white">Danah Web</span>
            </div>
            <h2 class="text-3xl font-extrabold leading-tight sm:text-4xl">
              Welcome Back to Danah Web
            </h2>
            <p class="mt-3 text-sm leading-6 text-white/58">
              Log in to continue building your premium digital experience.
            </p>
          </div>

          <div class="grid gap-5">
            <div class="relative">
              <input
                required
                id="login-email"
                type="email"
                name="email"
                placeholder=" "
                autocomplete="email"
                class="peer min-h-[54px] w-full rounded-xl border border-teal/35 bg-[#05091f]/80 px-4 pb-1 pt-5 text-sm font-medium text-white outline-none transition-all duration-300 placeholder:text-transparent focus:border-teal focus:shadow-[0_0_30px_rgba(0,210,196,0.18)] focus:ring-4 focus:ring-teal/15"
              />
              <label
                for="login-email"
                class="pointer-events-none absolute left-4 top-2 text-xs font-bold text-teal transition-all duration-300 peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-placeholder-shown:text-white/46 peer-focus:top-2 peer-focus:text-xs peer-focus:text-teal"
                >Email</label
              >
            </div>

            <div class="relative">
              <input
                required
                id="login-password"
                type="password"
                name="password"
                placeholder=" "
                autocomplete="current-password"
                class="peer min-h-[54px] w-full rounded-xl border border-teal/35 bg-[#05091f]/80 px-4 pb-1 pt-5 text-sm font-medium text-white outline-none transition-all duration-300 placeholder:text-transparent focus:border-teal focus:shadow-[0_0_30px_rgba(0,210,196,0.18)] focus:ring-4 focus:ring-teal/15"
              />
              <label
                for="login-password"
                class="pointer-events-none absolute left-4 top-2 text-xs font-bold text-teal transition-all duration-300 peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-placeholder-shown:text-white/46 peer-focus:top-2 peer-focus:text-xs peer-focus:text-teal"
                >Password</label
              >
            </div>

            <div
              class="flex flex-wrap items-center justify-between gap-3 text-sm"
            >
              <label
                class="inline-flex min-h-[44px] items-center gap-3 font-semibold text-white/68"
              >
                <input
                  type="checkbox"
                  name="remember"
                  class="h-4 w-4 rounded border-white/20 bg-[#05091f] accent-teal"
                />
                Remember Me
              </label>
              <a
                href="#"
                class="font-bold text-teal transition-colors duration-300 hover:text-cyan"
                >Forgot Password?</a
              >
            </div>

            <button
              type="submit"
              class="inline-flex min-h-[52px] w-full items-center justify-center rounded-full bg-gradient-to-r from-teal to-cyan px-7 text-sm font-extrabold text-white shadow-[0_18px_42px_rgba(0,181,226,0.3)] transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_22px_54px_rgba(0,210,196,0.38)]"
            >
              Login
            </button>
          </div>

          <div class="my-7 flex items-center gap-4">
            <span class="h-px flex-1 bg-white/10"></span>
            <span class="text-xs font-bold uppercase text-white/42"
              >or continue with</span
            >
            <span class="h-px flex-1 bg-white/10"></span>
          </div>

          <div class="grid gap-3 sm:grid-cols-2">
            <button
              type="button"
              class="inline-flex min-h-[50px] items-center justify-center gap-3 rounded-xl border border-white/12 bg-white/[0.055] px-4 text-sm font-extrabold text-white transition-all duration-300 hover:-translate-y-1 hover:border-teal/60 hover:bg-teal/10"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  fill="#EA4335"
                  d="M12 10.2v3.9h5.5c-.2 1.3-1.7 3.9-5.5 3.9a6 6 0 0 1 0-12c1.9 0 3.2.8 3.9 1.5l2.7-2.6A9.8 9.8 0 0 0 12 2a10 10 0 1 0 0 20c5.8 0 9.6-4.1 9.6-9.8 0-.7-.1-1.2-.2-1.9H12Z"
                />
              </svg>
              Continue with Google
            </button>
            <button
              type="button"
              class="inline-flex min-h-[50px] items-center justify-center gap-3 rounded-xl border border-white/12 bg-white/[0.055] px-4 text-sm font-extrabold text-white transition-all duration-300 hover:-translate-y-1 hover:border-teal/60 hover:bg-teal/10"
            >
              <svg
                width="21"
                height="21"
                viewBox="0 0 24 24"
                fill="currentColor"
                aria-hidden="true"
              >
                <path
                  d="M12 .5a12 12 0 0 0-3.8 23.39c.6.11.82-.26.82-.58v-2.04c-3.34.73-4.04-1.42-4.04-1.42-.55-1.4-1.34-1.77-1.34-1.77-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49.99.11-.78.42-1.3.76-1.6-2.66-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.46 11.46 0 0 1 6.01 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.69.83.57A12 12 0 0 0 12 .5Z"
                />
              </svg>
              Continue with GitHub
            </button>
          </div>

          <p class="mt-7 text-center text-sm font-medium text-white/58">
            Don't have an account?
            <a
              href="signup.html"
              class="font-extrabold text-teal transition-colors duration-300 hover:text-cyan"
              >Sign Up</a
            >
          </p>
        </form>

        <!-- Success Notification -->
        <div
          id="successMessage"
          class="pointer-events-none absolute top-6 left-6 opacity-0 transition-all duration-500 z-50"
        >
          <div
            class="rounded-lg border border-teal/50 bg-teal/10 px-4 py-3 backdrop-blur-xl"
          >
            <p class="text-sm font-semibold text-teal">
              ✓ Login successful! Redirecting...
            </p>
          </div>
        </div>

        <!-- Error Notification -->
        <div
          id="errorMessage"
          class="pointer-events-none absolute top-6 right-6 opacity-0 transition-all duration-500 z-50"
        >
          <div
            class="rounded-lg border border-red-500/50 bg-red-500/10 px-4 py-3 backdrop-blur-xl"
          >
            <p class="text-sm font-semibold text-red-400" id="errorText"></p>
          </div>
        </div>
      </div>
    </section>

    <script>
      // Login Form Handler
      const loginForm = document.getElementById("loginForm");
      const emailInput = document.getElementById("login-email");
      const passwordInput = document.getElementById("login-password");
      const rememberCheckbox = document.querySelector('input[name="remember"]');
      const successMsg = document.getElementById("successMessage");
      const errorMsg = document.getElementById("errorMessage");
      const errorText = document.getElementById("errorText");

      // Load remembered email on page load
      window.addEventListener("load", () => {
        const savedEmail = localStorage.getItem("danah_remembered_email");
        if (savedEmail) {
          emailInput.value = savedEmail;
          rememberCheckbox.checked = true;
        }
      });

      // Email validation
      emailInput.addEventListener("blur", validateEmail);
      emailInput.addEventListener("input", () => {
        if (emailInput.classList.contains("border-red-500")) {
          validateEmail();
        }
      });

      function validateEmail() {
        const email = emailInput.value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!email) {
          showFieldError(emailInput, "Email is required");
          return false;
        } else if (!emailRegex.test(email)) {
          showFieldError(emailInput, "Invalid email format");
          return false;
        } else {
          clearFieldError(emailInput);
          return true;
        }
      }

      // Password validation
      passwordInput.addEventListener("blur", validatePassword);
      passwordInput.addEventListener("input", () => {
        if (passwordInput.classList.contains("border-red-500")) {
          validatePassword();
        }
      });

      function validatePassword() {
        const password = passwordInput.value;

        if (!password) {
          showFieldError(passwordInput, "Password is required");
          return false;
        } else if (password.length < 8) {
          showFieldError(
            passwordInput,
            "Password must be at least 8 characters",
          );
          return false;
        } else {
          clearFieldError(passwordInput);
          return true;
        }
      }

      function showFieldError(field, message) {
        field.classList.add(
          "border-red-500",
          "focus:border-red-500",
          "focus:shadow-[0_0_30px_rgba(239,68,68,0.18)]",
        );
        const label = field.previousElementSibling;
        if (label) {
          label.classList.add("text-red-500");
        }
      }

      function clearFieldError(field) {
        field.classList.remove(
          "border-red-500",
          "focus:border-red-500",
          "focus:shadow-[0_0_30px_rgba(239,68,68,0.18)]",
        );
        const label = field.previousElementSibling;
        if (label) {
          label.classList.remove("text-red-500");
          label.classList.add("text-teal");
        }
      }

      function showNotification(message, isSuccess = true) {
        const notification = isSuccess ? successMsg : errorMsg;
        if (!isSuccess) {
          errorText.textContent = message;
        }
        notification.classList.remove("opacity-0");
        notification.classList.add("opacity-100");

        setTimeout(() => {
          notification.classList.remove("opacity-100");
          notification.classList.add("opacity-0");
        }, 4000);
      }

      // Form submission
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Prevent double submission
        if (isSubmitting) {
          return;
        }

        if (!validateEmail() || !validatePassword()) {
          showNotification("Please fill in all fields correctly", false);
          return;
        }

        isSubmitting = true;

        const submitBtn = loginForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = "Logging in...";
        submitBtn.style.opacity = "0.7";

        try {
          const response = await fetch(
            API_CONFIG.getUrl(API_CONFIG.ENDPOINTS.LOGIN),
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                identifier: emailInput.value,
                password: passwordInput.value,
              }),
            },
          );

          const data = await response.json();

          if (data.success) {
            if (data.requiresVerification) {
              showNotification(
                "Please verify your account. OTP sent to your email and mobile.",
                true,
              );
              // Store user ID for OTP verification
              localStorage.setItem("pendingUserId", data.userId);
              // Redirect to OTP verification page or show OTP inputs
              setTimeout(() => {
                window.location.href = "verify-otp.html";
              }, 2000);
            } else {
              // Store token and user data
              localStorage.setItem("token", data.token);
              localStorage.setItem("user", JSON.stringify(data.user));

              // Save email if remember me is checked
              if (rememberCheckbox.checked) {
                localStorage.setItem(
                  "danah_remembered_email",
                  emailInput.value,
                );
              } else {
                localStorage.removeItem("danah_remembered_email");
              }

              showNotification("Login successful! Redirecting...", true);

              // Redirect to dashboard or home
              setTimeout(() => {
                window.location.href = "index.html";
              }, 1500);
            }
          } else {
            showNotification(data.message, false);
          }
        } catch (error) {
          console.error("Login error:", error);
          showNotification("Network error. Please try again.", false);
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          submitBtn.style.opacity = "1";
          isSubmitting = false;
        }
      });

      // Social auth button handlers
      const socialButtons = loginForm.querySelectorAll('button[type="button"]');
      socialButtons.forEach((btn) => {
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          const provider = this.textContent.includes("Google")
            ? "Google"
            : "GitHub";
          console.log(`Attempting ${provider} authentication...`);
          // In production, implement OAuth flow here
        });
      });
    </script>
  </body>
</html>
